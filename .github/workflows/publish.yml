name: publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tags
        id: vars
        run: |
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=${{ steps.vars.outputs.sha_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Update deployment manifest
        run: |
          sed -i.bak "s|image: .*|image: $IMAGE_NAME:${{ steps.vars.outputs.sha_tag }}|" deploy/k8s/deployment.yaml
          rm deploy/k8s/deployment.yaml.bak
      - name: Commit deployment manifest
        run: |
          if git diff --quiet -- deploy/k8s/deployment.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/deployment.yaml
          git commit -m "[skip ci] Deploy ${{ steps.vars.outputs.sha_tag }}"
          git push
